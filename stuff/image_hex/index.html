<!DOCTYPE html>
<html>
<head>
    <title>Text + Noise Image Tools</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
        }

        canvas {
            margin-top: 20px;
            border: 1px solid #444;
            max-width: 100%;
        }

        input, button {
            margin-top: 10px;
            padding: 8px;
        }

        hr {
            margin: 20px 0;
            border-color: #333;
        }

        pre {
            white-space: pre-wrap;
            background: #222;
            padding: 10px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<h2>Text → Image + Noise Generator</h2>

<!-- TEXT TO IMAGE -->
<textarea id="textInput" placeholder="Enter text..."></textarea><br>
<button onclick="generateTextImage()">Generate Text Image</button>

<hr>

<!-- NOISE GENERATOR -->
<input id="noiseSize" type="number" placeholder="Noise size (e.g. 128)">
<button onclick="generateNoise()">Generate Color Noise</button>

<hr>

<p>Noise Map:</p>
<input type="file" id="noiseFile" accept="image/*">

<p>Target Image:</p>
<input type="file" id="imageFile" accept="image/*">

<br>

<button onclick="encrypt()">Encrypt (Add)</button>
<button onclick="decrypt()">Decrypt (Subtract)</button>

<div id="output"></div>

<!-- OUTPUT AREA -->
<div id="output"></div><hr>

<!-- DECODER -->
<h3>Decode Image → Text</h3>

<input type="file" id="decodeFile" accept="image/*">
<button onclick="generateDecodedText()">Decode Image</button>

<pre id="decodeOutput"></pre>

<script src="script.js"></script>

</body>
</html>
